# https://pr-agent-docs.codium.ai/
# https://github.com/Codium-ai/pr-agent/blob/main/pr_agent/settings/configuration.toml

[config]
ignore_pr_labels = ['renovate', 'skip-ai-review']
# models — primary + distinct fallback for resilience when primary is unavailable
model = "vertex_ai/gemini-3-flash-preview"
fallback_models = ["vertex_ai/gemini-2.5-flash"]

[ignore]
glob = ['*.json', '*.md']

[pr_description]
generate_ai_title = true
final_update_message = true
extra_instructions = """\
This repository is terraform-provider-lightdash (Go).

When generating the title and description:
- Lead with user-visible impact (provider behavior, new/changed resources or data sources, breaking changes).
- Mention scope: internal/lightdash vs internal/provider vs docs/examples.
- Testing: state whether `make test` is sufficient or if acceptance tests / manual Lightdash verification is expected (see CONTRIBUTING.md).
- If the PR touches API client code, note any Lightdash API version or endpoint assumptions.
- Keep the description concise; use bullet lists for changes and risks.
"""

[pr_reviewer]
require_tests_review = true
require_can_be_split_review = true
num_code_suggestions = 0
inline_code_comments = true
enable_auto_approval = false
maximal_review_effort = 5
extra_instructions = """\
You are reviewing the ubie-oss Terraform provider for Lightdash (Go).

Project facts (do not argue with maintainers about these):
- Core code: internal/lightdash (API client/models), internal/provider (Terraform).
- Unit tests: `make test` (internal/, skips acceptance). Acceptance: `make testacc` needs live Lightdash; see CONTRIBUTING.md.
- Generated/vendor docs may exist; prefer reviewing internal/ and provider logic over nitpicking generated artifacts unless the change is wrong.

What to prioritize in review:
1. Correctness of Terraform schema vs behavior (Computed/Optional/Required, state drift, Import).
2. Lightdash API usage: paths, auth assumptions, error handling, and backward compatibility.
3. Security: never log or echo secrets/tokens; validate untrusted API fields before state.
4. Tests: prefer real collaborators / table-driven tests; do not demand mocks unless the codebase already uses them in that area.

What to deprioritize or skip:
- Style nits already covered by formatters/linters (go fmt, trunk).
- Demanding full acceptance test runs on every PR (call out when testacc is relevant instead).

If suggesting changes, keep them minimal and consistent with existing patterns in the touched package.
"""

[pr_questions]
enable_help_text = true

[pr_code_suggestions]
num_code_suggestions = 0
rank_suggestions = false
commitable_code_suggestions = false
demand_code_suggestions_self_review = false
extra_instructions = """\
If batch code suggestions are enabled later: suggest only small, local fixes that are obviously correct; do not propose wide refactors or renames.
"""
