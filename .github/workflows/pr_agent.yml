# SEE https://qodo-merge-docs.qodo.ai/installation/github/
name: PR Agent

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]
  issue_comment:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      # checkov:skip=CKV2_GHA_1
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    timeout-minutes: 5
    name: Run pr agent on every pull request, respond to user comments
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # ratchet:google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/131500153501/locations/global/workloadIdentityPools/github-oidc-pool/providers/github-oidc-provider
          service_account: ai-code-review@ubie-oss-data-engineering.iam.gserviceaccount.com
          access_token_lifetime: 300
      - name: PR Agent action step
        id: pragent
        uses: Codium-ai/pr-agent@e6ef3c0adfbe1c5ffc6818f8dd420c74c8dc6ea8 # ratchet:Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
