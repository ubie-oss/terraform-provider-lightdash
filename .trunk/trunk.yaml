# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.25.9
    - node@24.14.0
    - python@3.14.4
lint:
  ignore:
    - linters: [ALL]
      paths:
        - docs/**
        - examples/**
        - tools/**
    # Terraform files under the internal/provider directory aren't linted by tflint,
    # because AI-assisted IDE (Cursor) recognizes linter errors in these files.
    - linters: [tflint]
      paths:
        - internal/provider/**
    - linters: [terraform]
      paths:
        # Tentatively disable terraform linting for acc_tests/function_*/**,
        # because `terraform fmt` can't appropriately handle provider provided functions.
        - internal/provider/acc_tests/functions/**
    - linters: [markdownlint]
      paths:
        - internal/provider/docs/**
  enabled:
    - osv-scanner@2.3.5
    - ruff@0.15.12
    - golangci-lint2@2.11.4
    - renovate@43.150.0
    - taplo@0.10.0
    - terraform@1.14.0
    - semgrep@1.161.0
    - gitleaks@8.30.1
    - goimports@0.9.1
    - bandit@1.9.4
    - actionlint@1.7.12
    - git-diff-check
    - gofmt@1.20.4
    - markdownlint@0.48.0
    - prettier@3.8.3
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - tflint@0.62.0
    - yamllint@1.38.0
  disabled:
    - trufflehog
    - checkov
    - black
    - isort
actions:
  enabled:
    - trunk-upgrade-available
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
